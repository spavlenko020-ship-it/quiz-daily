<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#05020f" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Daily Quiz">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="format-detection" content="telephone=no">
  <title>Daily Quiz</title>
  <script src="https://connect.facebook.net/en_US/fbinstant.8.0.js"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="./vendor/confetti.browser.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700;800;900&display=swap">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { height: 100%; }
    body {
      min-height: 100vh;
      min-height: 100dvh;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: #ffffff;
      background: #05020f;
      overscroll-behavior: none;
      overflow-y: auto;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      -webkit-text-size-adjust: 100%;
      position: relative;
    }
    #app {
      min-height: 100vh;
      min-height: 100dvh;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      background: transparent;
      padding-top: env(safe-area-inset-top, 0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      padding-left: env(safe-area-inset-left, 0px);
      padding-right: env(safe-area-inset-right, 0px);
      box-sizing: border-box;
    }
    @media (min-width: 481px) {
      body::after {
        content: '';
        position: fixed; top: 0; bottom: 0; left: 0; right: 0;
        pointer-events: none;
        box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03);
      }
      #app {
        box-shadow: 0 0 80px rgba(123,47,247,0.15), 0 0 0 1px rgba(255,255,255,0.05);
      }
    }
    .font-display { font-family: 'Space Grotesk', 'Inter', sans-serif; letter-spacing: -0.02em; }
    button { font-family: inherit; }
    input, textarea, button { outline: none; -webkit-tap-highlight-color: transparent; }
    ::selection { background: rgba(255,46,154,0.4); color: #fff; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
